<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Edit Student - Student Record Management System">
    <title>Edit Student — Student Records</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
</head>
<body>
    <div class="app-layout" id="app">
        <div class="main-content" id="main-content">
            <div class="page-content">
                <div class="loading-state" id="loading">
                    <div class="loading-spinner"></div>
                    <p>Loading student data...</p>
                </div>

                <div id="edit-content" class="hidden">
                    <div class="card">
                        <div class="card-header">
                            <h2>✏️ Edit Student</h2>
                            <a href="/view-students.html" class="btn btn-sm btn-secondary">← Back to List</a>
                        </div>

                        <form id="edit-student-form">
                            <h3 style="font-size: 15px; color: var(--accent-tertiary); margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border-color);">
                                👤 Personal Information
                            </h3>

                            <div class="form-row">
                                <div class="form-group">
                                    <label>Student ID <span class="required">*</span></label>
                                    <input type="text" id="studentId" class="form-control" required>
                                </div>
                                <div class="form-group">
                                    <label>Student Name <span class="required">*</span></label>
                                    <input type="text" id="name" class="form-control" required>
                                </div>
                            </div>

                            <div class="form-row-3">
                                <div class="form-group">
                                    <label>Gender <span class="required">*</span></label>
                                    <select id="gender" class="form-control" required>
                                        <option value="">Select Gender</option>
                                        <option value="Male">Male</option>
                                        <option value="Female">Female</option>
                                        <option value="Other">Other</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label>Date of Birth <span class="required">*</span></label>
                                    <input type="date" id="dateOfBirth" class="form-control" required>
                                </div>
                                <div class="form-group">
                                    <label>Email</label>
                                    <input type="email" id="email" class="form-control">
                                </div>
                            </div>

                            <h3 style="font-size: 15px; color: var(--accent-tertiary); margin: 24px 0 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border-color);">
                                🎓 Academic Information
                            </h3>

                            <div class="form-row">
                                <div class="form-group">
                                    <label>Class <span class="required">*</span></label>
                                    <select id="classId" class="form-control" required>
                                        <option value="">Select Class</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label>Section <span class="required">*</span></label>
                                    <select id="sectionId" class="form-control" required>
                                        <option value="">Select Section</option>
                                    </select>
                                </div>
                            </div>

                            <div class="form-group">
                                <label>Subjects</label>
                                <div class="subject-tags" id="subject-tags"></div>
                                <div class="subject-input-wrap">
                                    <input type="text" id="subject-input" class="form-control" placeholder="Type subject name and press Enter" style="flex: 1;">
                                    <button type="button" class="btn btn-secondary btn-sm" onclick="addSubject()">Add</button>
                                </div>
                            </div>

                            <h3 style="font-size: 15px; color: var(--accent-tertiary); margin: 24px 0 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border-color);">
                                👨‍👩‍👧 Guardian Information
                            </h3>

                            <div class="form-row">
                                <div class="form-group">
                                    <label>Parent/Guardian Name <span class="required">*</span></label>
                                    <input type="text" id="parentName" class="form-control" required>
                                </div>
                                <div class="form-group">
                                    <label>Contact Number <span class="required">*</span></label>
                                    <input type="tel" id="contactNumber" class="form-control" required>
                                </div>
                            </div>

                            <div class="form-group">
                                <label>Address <span class="required">*</span></label>
                                <textarea id="address" class="form-control" required></textarea>
                            </div>

                            <div style="margin-top: 32px; display: flex; gap: 12px; justify-content: flex-end;">
                                <a href="/view-students.html" class="btn btn-secondary">Cancel</a>
                                <button type="submit" class="btn btn-primary btn-lg" id="submit-btn">
                                    <span id="submit-text">💾 Update Student</span>
                                    <div class="spinner hidden" id="submit-spinner"></div>
                                </button>
                            </div>
                        </form>
                    </div>

                    <!-- Marks Management -->
                    <div class="card mt-24">
                        <div class="card-header">
                            <h2>📝 Manage Marks</h2>
                        </div>

                        <div id="existing-marks"></div>

                        <h3 style="font-size: 14px; color: var(--text-secondary); margin: 20px 0 12px;">Add New Marks</h3>
                        <div id="new-marks-container"></div>
                        <div style="display: flex; gap: 12px; margin-top: 12px;">
                            <button type="button" class="btn btn-sm btn-secondary" onclick="addNewMarkRow()">➕ Add Row</button>
                            <button type="button" class="btn btn-sm btn-primary" onclick="saveNewMarks()">💾 Save Marks</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script src="/js/utils.js"></script>
    <script>
        let studentDbId = null;
        let subjects = [];

        (async () => {
            document.getElementById('app').insertAdjacentHTML('afterbegin', getSidebarHTML());
            document.getElementById('main-content').insertAdjacentHTML('afterbegin', getHeaderHTML('Edit Student', 'Students > <span>Edit</span>'));

            const user = await setupPage('view-students');
            if (!user) return;

            const params = new URLSearchParams(window.location.search);
            studentDbId = params.get('id');

            if (!studentDbId) {
                showToast('error', 'Error', 'No student ID provided');
                setTimeout(() => window.location.href = '/view-students.html', 1500);
                return;
            }

            await loadStudentData();
        })();

        async function loadStudentData() {
            const data = await apiRequest(`/students/${studentDbId}`);
            if (!data || !data.success) {
                showToast('error', 'Error', 'Student not found');
                setTimeout(() => window.location.href = '/view-students.html', 1500);
                return;
            }

            const s = data.data.student;
            const marks = data.data.marks;

            // Fill form fields
            document.getElementById('studentId').value = s.studentId;
            document.getElementById('name').value = s.name;
            document.getElementById('gender').value = s.gender;
            document.getElementById('dateOfBirth').value = formatDateInput(s.dateOfBirth);
            document.getElementById('email').value = s.email || '';
            document.getElementById('parentName').value = s.parentName;
            document.getElementById('contactNumber').value = s.contactNumber;
            document.getElementById('address').value = s.address;

            // Load class dropdown then select
            await loadClassesDropdown('classId', s.classId?._id || s.classId);

            // Load section dropdown then select
            const classVal = s.classId?._id || s.classId;
            if (classVal) {
                await loadSectionsDropdown('sectionId', classVal, s.sectionId?._id || s.sectionId);
            }

            // Class change listener
            document.getElementById('classId').addEventListener('change', (e) => {
                loadSectionsDropdown('sectionId', e.target.value);
            });

            // Subjects
            subjects = s.subjects || [];
            renderSubjects();

            document.getElementById('subject-input').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') { e.preventDefault(); addSubject(); }
            });

            // Existing marks
            if (marks && marks.length > 0) {
                renderExistingMarks(marks);
            } else {
                document.getElementById('existing-marks').innerHTML = '<p class="text-muted" style="padding: 12px 0;">No marks recorded yet</p>';
            }

            document.getElementById('loading').classList.add('hidden');
            document.getElementById('edit-content').classList.remove('hidden');
        }

        function renderExistingMarks(marks) {
            const container = document.getElementById('existing-marks');
            container.innerHTML = `
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Subject</th>
                                <th>Marks</th>
                                <th>Max</th>
                                <th>Grade</th>
                                <th>Exam</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${marks.map(m => `
                                <tr id="mark-${m._id}">
                                    <td style="font-weight: 500; color: var(--text-primary);">${m.subject}</td>
                                    <td>${m.marksObtained}</td>
                                    <td>${m.maxMarks}</td>
                                    <td><span class="grade-badge ${getGradeClass(m.grade)}">${m.grade}</span></td>
                                    <td><span class="badge badge-purple">${m.examType}</span></td>
                                    <td>
                                        <button class="btn btn-sm btn-danger" onclick="deleteMark('${m._id}')">🗑️</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>`;
        }

        async function deleteMark(markId) {
            const data = await apiRequest(`/marks/${markId}`, { method: 'DELETE' });
            if (data && data.success) {
                showToast('success', 'Deleted', 'Mark deleted');
                const row = document.getElementById(`mark-${markId}`);
                if (row) row.remove();
            } else {
                showToast('error', 'Error', data?.message || 'Failed to delete mark');
            }
        }

        function addSubject() {
            const input = document.getElementById('subject-input');
            const val = input.value.trim();
            if (val && !subjects.includes(val)) {
                subjects.push(val);
                renderSubjects();
                input.value = '';
            }
            input.focus();
        }

        function removeSubject(idx) {
            subjects.splice(idx, 1);
            renderSubjects();
        }

        function renderSubjects() {
            document.getElementById('subject-tags').innerHTML = subjects.map((s, i) => `
                <span class="subject-tag">${s}<span class="remove-subject" onclick="removeSubject(${i})">✕</span></span>
            `).join('');
        }

        let newMarkCount = 0;
        function addNewMarkRow() {
            newMarkCount++;
            const container = document.getElementById('new-marks-container');
            const row = document.createElement('div');
            row.className = 'marks-entry-row';
            row.id = `new-mark-${newMarkCount}`;
            row.innerHTML = `
                <input type="text" class="form-control new-mark-subject" placeholder="Subject">
                <input type="number" class="form-control new-mark-obtained" placeholder="Marks" min="0" max="100">
                <input type="number" class="form-control new-mark-max" placeholder="Max" value="100" min="1">
                <select class="form-control new-mark-exam">
                    <option value="Final">Final</option>
                    <option value="Midterm">Midterm</option>
                    <option value="Quiz">Quiz</option>
                    <option value="Assignment">Assignment</option>
                    <option value="Practical">Practical</option>
                </select>
                <button type="button" class="btn btn-icon btn-danger" onclick="this.parentElement.remove()">✕</button>
            `;
            container.appendChild(row);
        }

        async function saveNewMarks() {
            const rows = document.querySelectorAll('#new-marks-container .marks-entry-row');
            const marks = [];
            rows.forEach(row => {
                const subject = row.querySelector('.new-mark-subject').value.trim();
                const obtained = parseFloat(row.querySelector('.new-mark-obtained').value);
                const max = parseFloat(row.querySelector('.new-mark-max').value) || 100;
                const examType = row.querySelector('.new-mark-exam').value;
                if (subject && !isNaN(obtained)) {
                    marks.push({ subject, marksObtained: obtained, maxMarks: max, examType });
                }
            });

            if (marks.length === 0) {
                showToast('warning', 'No Marks', 'Add at least one mark entry');
                return;
            }

            const data = await apiRequest('/marks', {
                method: 'POST',
                body: { studentId: studentDbId, marks }
            });

            if (data && data.success) {
                showToast('success', 'Saved', 'Marks saved successfully');
                document.getElementById('new-marks-container').innerHTML = '';
                // Reload marks
                const studentData = await apiRequest(`/students/${studentDbId}`);
                if (studentData && studentData.success) {
                    renderExistingMarks(studentData.data.marks);
                }
            } else {
                showToast('error', 'Error', data?.message || 'Failed to save marks');
            }
        }

        // Form submit — update student info
        document.getElementById('edit-student-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const submitBtn = document.getElementById('submit-btn');
            const submitText = document.getElementById('submit-text');
            const submitSpinner = document.getElementById('submit-spinner');

            submitBtn.disabled = true;
            submitText.textContent = 'Updating...';
            submitSpinner.classList.remove('hidden');

            const studentData = {
                studentId: document.getElementById('studentId').value.trim(),
                name: document.getElementById('name').value.trim(),
                classId: document.getElementById('classId').value,
                sectionId: document.getElementById('sectionId').value,
                gender: document.getElementById('gender').value,
                dateOfBirth: document.getElementById('dateOfBirth').value,
                parentName: document.getElementById('parentName').value.trim(),
                contactNumber: document.getElementById('contactNumber').value.trim(),
                address: document.getElementById('address').value.trim(),
                email: document.getElementById('email').value.trim(),
                subjects
            };

            try {
                const data = await apiRequest(`/students/${studentDbId}`, {
                    method: 'PUT',
                    body: studentData
                });

                if (data && data.success) {
                    showToast('success', 'Updated!', `${studentData.name} updated successfully`);
                } else {
                    showToast('error', 'Failed', data?.message || 'Could not update student');
                }
            } catch {}

            submitBtn.disabled = false;
            submitText.textContent = '💾 Update Student';
            submitSpinner.classList.add('hidden');
        });
    </script>
</body>
</html>
